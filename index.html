<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneEyeWilly Sportsboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <div class="header-wrap">
      <header class="header">

        <div class="brand">
          <div class="brand-logo">W</div>

          <!-- Title + Theme Toggle -->
          <div class="title-row">
            <div class="title">OneEyeWilly • Daily Board</div>

            <button id="themeToggle" class="theme-toggle">
              <span class="theme-icon">🌙</span>
              <span class="theme-label">Dark</span>
            </button>
          </div>
        </div>

        <div class="subtitle">Multi-league • ESPN feed • Auto-updating</div>
        <div class="updated" id="updatedText">Loading…</div>

      </header>
    </div>

    <!-- PICKS CARD -->
    <section class="card" id="picksCard">
      <div class="card-header">
        <div class="card-title">My Picks</div>
      </div>
      <div class="games" id="picksList"></div>
    </section>

    <!-- MLS -->
    <section class="card" id="soccerCard">
      <div class="card-header">
        <div class="card-title">⚽ MLS</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="soccerGames"></div>
    </section>

    <!-- MLB -->
    <section class="card" id="mlbCard">
      <div class="card-header">
        <div class="card-title">⚾ MLB</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="mlbGames"></div>
    </section>

    <!-- NBA -->
    <section class="card" id="nbaCard">
      <div class="card-header">
        <div class="card-title">🏀 NBA</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="nbaGames"></div>
    </section>

    <!-- NHL -->
    <section class="card" id="nhlCard">
      <div class="card-header">
        <div class="card-title">🏒 NHL</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="nhlGames"></div>
    </section>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-target="top">⬆ Top</button>
    <button class="nav-btn" data-target="soccerCard">⚽ MLS</button>
    <button class="nav-btn" data-target="mlbCard">⚾ MLB</button>
    <button class="nav-btn" data-target="nbaCard">🏀 NBA</button>
    <button class="nav-btn" data-target="nhlCard">🏒 NHL</button>
  </nav>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
