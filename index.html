<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />          
  <title>OneEyeWilly • Daily Multi-League Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #05060a;
      --bg-alt: #070914;
      --card: #11141c;
      --accent: #3ea6ff;
      --accent-soft: #243447;
      --text: #f5f7ff;
      --muted: #9aa4c2;
      --danger: #ff4d6a;
      --success: #4dff88;
      --live-pulse: rgba(255, 77, 106, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #15192a 0, #05060a 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 40px;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 12px 12px 40px;
    }

    /* Sticky header */
    .header-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(5,6,10,0.96), rgba(5,6,10,0.85), transparent);
      padding: 8px 12px 6px;
      margin: 0 -12px 4px;
      backdrop-filter: blur(10px);
    }
    .header {
      text-align: center;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .brand-logo {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: radial-gradient(circle at 30% 20%, #ffe27a, #ff4d6a 45%, #3ea6ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 800;
      color: #05060a;
      box-shadow: 0 0 12px rgba(255, 77, 106, 0.7);
    }
    .title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .updated {
      font-size: 0.72rem;
      color: var(--accent);
      margin-top: 2px;
    }

    /* Cards */
    .card {
      background: linear-gradient(135deg, #10131c, #05060a);
      border-radius: 16px;
      padding: 14px 14px 10px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 14px 30px rgba(0,0,0,0.55);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .pill {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .games {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 6px;
      max-height: 260px;
      overflow-y: auto;
    }
    .game {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.8rem;
    }
    .game:last-child {
      border-bottom: none;
    }
    .game.final {
      background: linear-gradient(90deg, rgba(77,255,136,0.06), transparent);
    }
    .game.live {
      background: radial-gradient(circle at left, rgba(255,77,106,0.18), transparent);
      box-shadow: 0 0 0 1px rgba(255,77,106,0.25);
      position: relative;
    }
    .game.live::before {
      content: "";
      position: absolute;
      left: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 6px var(--live-pulse);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 2px var(--live-pulse); opacity: 1; }
      100% { box-shadow: 0 0 0 10px transparent; opacity: 0.2; }
    }

    .teams {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .team-line {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .team-logo {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #222633;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: var(--muted);
      flex-shrink: 0;
      overflow: hidden;
    }
    .team-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .team-name {
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .score {
      font-weight: 600;
    }
    .status {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
      min-width: 70px;
    }
    .status.live {
      color: var(--danger);
      font-weight: 600;
    }
    .status.final {
      color: var(--success);
      font-weight: 600;
    }

    .footer-note {
      margin-top: 10px;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 520px;
      margin: 0 auto;
      padding: 6px 10px 8px;
      background: linear-gradient(to top, rgba(5,6,10,0.98), rgba(5,6,10,0.9), transparent);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      gap: 6px;
      z-index: 30;
    }
    .nav-btn {
      flex: 1;
      border-radius: 999px;
      padding: 6px 4px;
      font-size: 0.7rem;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(15,18,28,0.9);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .nav-btn.active {
      background: linear-gradient(135deg, #3ea6ff, #7b5cff);
      color: #05060a;
      border-color: transparent;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header-wrap">
      <header class="header">
        <div class="brand">
          <div class="brand-logo">W</div>
          <div class="title">OneEyeWilly • Daily Board</div>
        </div>
        <div class="subtitle">Multi-league • ESPN feed • Auto-updating</div>
        <div class="updated" id="updatedText">Loading…</div>
      </header>
    </div>

    <!-- Picks -->
    <section class="card">
      <div class="card-header">
        <div class="card-title">🧭 Captain Tin’s Picks</div>
        <div class="pill">Daily</div>
      </div>
      <div class="picks-list">
        <div class="pick-line"><span>Galaxy ML</span><span class="pick-tag">Edge</span></div>
        <div class="pick-line"><span>MLB K Prop</span><span class="pick-tag">Prop</span></div>
        <div class="pick-line"><span>NBA Total</span><span class="pick-tag">Lean</span></div>
        <div class="pick-line"><span>NHL Under</span><span class="pick-tag">Goalie</span></div>
      </div>
    </section>

    <!-- Soccer -->
    <section class="card" id="soccerCard">
      <div class="card-header">
        <div class="card-title">🏆 Soccer</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="soccerGames"></div>
    </section>

    <!-- MLB -->
    <section class="card" id="mlbCard">
      <div class="card-header">
        <div class="card-title">⚾ MLB</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="mlbGames"></div>
    </section>

    <!-- NBA -->
    <section class="card" id="nbaCard">
      <div class="card-header">
        <div class="card-title">🏀 NBA</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="nbaGames"></div>
    </section>

    <!-- NHL -->
    <section class="card" id="nhlCard">
      <div class="card-header">
        <div class="card-title">🏒 NHL</div>
        <div class="pill">Today</div>
      </div>
      <div class="games" id="nhlGames"></div>
    </section>

    <div class="footer-note">
      Data from ESPN public APIs. Refresh for latest.
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-target="top">🏠 Home</button>
    <button class="nav-btn" data-target="soccerCard">🏆 Soccer</button>
    <button class="nav-btn" data-target="mlbCard">⚾ MLB</button>
    <button class="nav-btn" data-target="nbaCard">🏀 NBA</button>
    <button class="nav-btn" data-target="nhlCard">🏒 NHL</button>
  </nav>

  <!-- Load external JS -->
  <script src="app.js?v=4"></script>
  
</body>
</html>
